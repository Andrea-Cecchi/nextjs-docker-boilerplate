services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextjsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - custom-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nextjsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine3.21
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=farmixredis
      - REDIS_PORT=6379
      - REDIS_DATABASES=16
    networks:
      - custom-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - custom-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && npm run start:migrate:prod"

  farmix-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REQUEST_TIMEOUT=120
      - BATCH_SIZE=1000
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - custom-network
    healthcheck:
      test: ["CMD", "python", "main.py", "--test-connection"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:

networks:
  custom-network:
    driver: bridge
